<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMCTS Caseworker Task Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <span class="tag">HMCTS</span>
    <h1>Caseworker Task Manager</h1>
  </header>

  <main>
    <section>
      <h2>Add a task</h2>
      <form id="task-form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required />

        <label for="description">Description (optional)</label>
        <textarea id="description" name="description"></textarea>

        <label for="status">Status</label>
        <select id="status" name="status" required>
          <option value="To Do">To Do</option>
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
        </select>

        <label for="dueDate">Due date and time</label>
        <input type="datetime-local" id="dueDate" name="dueDate" required />

        <button type="submit">Add task</button>
        <p id="form-error" class="error hidden" role="alert"></p>
      </form>
    </section>

    <section>
      <h2>Tasks</h2>
      <div id="task-list" aria-live="polite"></div>
    </section>
  </main>

  <!-- Set this if the backend isn't running on the default http://localhost:4000 -->
  <script>
    window.API_BASE_URL = window.API_BASE_URL || 'http://localhost:4000';
  </script>
  <script src="js/helpers.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
